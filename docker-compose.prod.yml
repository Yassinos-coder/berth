# Production panel stack — installed by install.sh on a fresh VPS.
#   docker compose -f docker-compose.prod.yml up -d --build
# Reads secrets from .env (generated by install.sh).
services:
  postgres:
    image: postgres:16-alpine
    container_name: berth-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-berth}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-berth}
      POSTGRES_DB: ${POSTGRES_DB:-berth}
    volumes:
      - berth-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-berth} -d ${POSTGRES_DB:-berth}']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: berth-redis
    restart: unless-stopped
    volumes:
      - berth-redisdata:/data

  server:
    build:
      context: .
      dockerfile: apps/berth-server/Dockerfile
    container_name: berth-server
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-berth}:${POSTGRES_PASSWORD:-berth}@postgres:5432/${POSTGRES_DB:-berth}
      REDIS_URL: redis://redis:6379
      BERTH_CA_CERT_PATH: /certs/ca.pem
      BERTH_CA_KEY_PATH: /certs/ca-key.pem
    volumes:
      - ${BERTH_CERT_DIR:-./panel-certs}:/certs
    ports:
      - '4443:4443'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  ui:
    build:
      context: .
      dockerfile: apps/berth-ui/Dockerfile
    container_name: berth-ui
    restart: unless-stopped
    ports:
      - '${BERTH_UI_PORT:-3000}:80'
    depends_on:
      - server

volumes:
  berth-pgdata:
  berth-redisdata:
